# Generated by Proto Lake. Edit freely — Proto Lake will not overwrite it on rebuild.
#
# Opens a release PR on every push to main, aggregating conventional-commit
# changes into version bumps for each bundle. Merging the release PR creates
# tags that fire the publish workflow.
name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
