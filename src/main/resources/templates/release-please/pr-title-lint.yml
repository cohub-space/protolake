# Generated by Proto Lake. Edit freely — Proto Lake will not overwrite it on rebuild.
#
# Lints PR titles against the Conventional Commits spec. release-please reads
# the squash-merged commit message (i.e., the PR title) to compute version
# bumps; a non-conforming title would silently skip the bump. Configure this
# job as a required status check on `main` to enforce.
name: PR title lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional Commits types release-please understands.
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            test
            build
            ci
            style
            revert
