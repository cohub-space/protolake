# Generated by Proto Lake. Edit freely — Proto Lake will not overwrite it on rebuild.
#
# Single workflow that handles both release-please's Release-PR maintenance and
# the artifact publish, gated on `releases_created` and matrix-fanned-out by
# `paths_released`.
#
# Why one workflow instead of `on: push: tags`: tags created by the default
# GITHUB_TOKEN do NOT trigger downstream workflows
# (https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow),
# so a separate tag-triggered publish workflow would silently never fire.
#
# Configure repository variables (Settings → Secrets and variables → Actions):
#   GCP_PROJECT_ID, GCP_REGION  — for AR URLs
#   WIF_PROVIDER, CI_SERVICE_ACCOUNT — for workload identity federation
name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  PROTOLAKE_IMAGE: ghcr.io/cohub-space/protolake:latest

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released:   ${{ steps.release.outputs.paths_released }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bundle-path: ${{ fromJson(needs.release-please.outputs.paths_released) }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Publish bundle
        run: |
          AR_TOKEN="$(gcloud auth print-access-token)"
          PROTOLAKE_IMAGE="${{ env.PROTOLAKE_IMAGE }}" \
          PROTOLAKE_BAZEL_CONFIG=ci \
          MAVEN_REPO="https://${{ vars.GCP_REGION }}-maven.pkg.dev/${{ vars.GCP_PROJECT_ID }}/maven-internal" \
          PYPI_REPO="https://${{ vars.GCP_REGION }}-python.pkg.dev/${{ vars.GCP_PROJECT_ID }}/python-internal/" \
          REGISTRY_TOKEN="${AR_TOKEN}" \
          NPM_PUBLISH_MODE="registry" \
          NPM_REGISTRY_URL="https://${{ vars.GCP_REGION }}-npm.pkg.dev/${{ vars.GCP_PROJECT_ID }}/npm-internal/" \
          NPM_REGISTRY_TOKEN="${AR_TOKEN}" \
            ./protolakew --pull always publish --bundle "${{ matrix.bundle-path }}"
