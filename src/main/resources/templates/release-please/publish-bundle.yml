# Generated by Proto Lake. Edit freely — Proto Lake will not overwrite it on rebuild.
#
# Manual recovery / out-of-band publish for a single bundle, triggered via the
# Actions UI (workflow_dispatch). Use when:
#
#   - release-please tagged a version but the publish job failed (e.g., transient
#     AR outage, gazelle bug pre-fix). The tag/release exist, but the artifact
#     never reached the registry. release.yml won't retry — this workflow does.
#   - You want to re-publish a specific version of a bundle for any reason
#     without going through release-please.
#
# This workflow does NOT touch git tags or release-please-manifest.json. It just
# runs `protolakew publish --bundle <path>`, which uses whatever version is
# currently in the bundle's bundle.yaml. Make sure bundle.yaml has the version
# you want published before triggering.
#
# Configure repository variables (Settings → Secrets and variables → Actions):
#   GCP_PROJECT_ID, GCP_REGION  — for AR URLs
#   WIF_PROVIDER, CI_SERVICE_ACCOUNT — for workload identity federation
name: publish-bundle (manual)

on:
  workflow_dispatch:
    inputs:
      bundle-path:
        description: "Bundle path to publish (e.g., cohub/iam). Reads version from that bundle's bundle.yaml."
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  PROTOLAKE_IMAGE: ghcr.io/cohub-space/protolake:latest

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Publish bundle
        run: |
          AR_TOKEN="$(gcloud auth print-access-token)"
          PROTOLAKE_IMAGE="${{ env.PROTOLAKE_IMAGE }}" \
          PROTOLAKE_BAZEL_CONFIG=ci \
          MAVEN_REPO="https://${{ vars.GCP_REGION }}-maven.pkg.dev/${{ vars.GCP_PROJECT_ID }}/maven-internal" \
          PYPI_REPO="https://${{ vars.GCP_REGION }}-python.pkg.dev/${{ vars.GCP_PROJECT_ID }}/python-internal/" \
          REGISTRY_TOKEN="${AR_TOKEN}" \
          NPM_PUBLISH_MODE="registry" \
          NPM_REGISTRY_URL="https://${{ vars.GCP_REGION }}-npm.pkg.dev/${{ vars.GCP_PROJECT_ID }}/npm-internal/" \
          NPM_REGISTRY_TOKEN="${AR_TOKEN}" \
            ./protolakew --pull always publish --bundle "${{ inputs.bundle-path }}"
