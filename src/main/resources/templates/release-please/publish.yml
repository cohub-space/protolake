# Generated by Proto Lake. Edit freely — Proto Lake will not overwrite it on rebuild.
#
# Triggered by release-please-cut tags. Parses the tag (form:
# <package-name>-v<version>), maps it to a bundle path via
# release-please-config.json, and runs `protolakew publish --bundle <path>`.
#
# Configure repository variables (Settings → Secrets and variables → Actions):
#   GCP_PROJECT_ID, GCP_REGION  — for AR URLs
#   WIF_PROVIDER, CI_SERVICE_ACCOUNT — for workload identity federation
name: publish

on:
  push:
    tags:
      - '*-v*'

permissions:
  id-token: write
  contents: read

env:
  PROTOLAKE_IMAGE: ghcr.io/cohub-space/protolake:latest

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Map tag to bundle path
        id: parse-tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF##*/}"
          PACKAGE_NAME="${TAG%-v*}"
          BUNDLE_PATH=$(jq -r \
            --arg pn "$PACKAGE_NAME" \
            '.packages | to_entries | map(select(.value."package-name" == $pn)) | .[0].key // empty' \
            release-please-config.json)
          if [ -z "$BUNDLE_PATH" ]; then
            echo "::error::Could not map tag '$TAG' (package-name '$PACKAGE_NAME') to a bundle in release-please-config.json"
            exit 1
          fi
          echo "bundle-path=$BUNDLE_PATH" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG → $BUNDLE_PATH"

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Publish bundle
        run: |
          AR_TOKEN="$(gcloud auth print-access-token)"
          PROTOLAKE_IMAGE="${{ env.PROTOLAKE_IMAGE }}" \
          PROTOLAKE_BAZEL_CONFIG=ci \
          MAVEN_REPO="https://${{ vars.GCP_REGION }}-maven.pkg.dev/${{ vars.GCP_PROJECT_ID }}/maven-internal" \
          PYPI_REPO="https://${{ vars.GCP_REGION }}-python.pkg.dev/${{ vars.GCP_PROJECT_ID }}/python-internal/" \
          REGISTRY_TOKEN="${AR_TOKEN}" \
          NPM_PUBLISH_MODE="registry" \
          NPM_REGISTRY_URL="https://${{ vars.GCP_REGION }}-npm.pkg.dev/${{ vars.GCP_PROJECT_ID }}/npm-internal/" \
          NPM_REGISTRY_TOKEN="${AR_TOKEN}" \
            ./protolakew --pull always publish --bundle "${{ steps.parse-tag.outputs.bundle-path }}"
